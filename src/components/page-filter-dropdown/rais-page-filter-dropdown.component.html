<div
  [class.rais-pf-dropdown--horizontal]="labelPlacement === 'horizontal'"
  [class.rais-pf-dropdown--vertical]="labelPlacement === 'vertical'"
>
  <span class="rais-pf-dropdown__label">{{ label }}</span>
  <div class="rais-pf-dropdown__input" [style.width.px]="width">
    <span *ngIf="hasValue" class="rais-pf-dropdown__value">{{ value }}</span>
    <span *ngIf="!hasValue" class="rais-pf-dropdown__placeholder">{{ placeholder }}</span>
    <span class="rais-pf-dropdown__caret">
      <!-- Tight-box caret (triangle fills the canvas) — the boxicons bx-caret-down
           has built-in padding and renders ~5px wide at this size -->
      <img src="assets/boxicons/bx-caret-down-tight.svg" width="9" height="5" alt="caret" />
    </span>
  </div>
</div>
